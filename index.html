<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Fintech - Cadastro</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            /* Paleta de cores do projeto */
            "rosa-fundo":   "#fce4ec",   
            "rosa-card":    "#f8d7e3",   
            "rosa-lateral": "#f07b8a",   
            "rosa-botao":   "#e91e63",  
            "rosa-titulo":  "#e91e63",   
          },
          fontFamily: {
            display: ["Nunito", "sans-serif"],
            corpo:   ["Poppins", "sans-serif"],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-rosa-fundo min-h-screen flex items-center justify-center px-4 py-10">

  <div class="fade-up w-full max-w-[680px] bg-rosa-card rounded-3xl shadow-lg overflow-hidden flex flex-col md:flex-row">

    <div class="bg-rosa-lateral w-full md:w-[240px] flex flex-col items-center justify-center gap-4 px-8 py-12 rounded-3xl">

      <h2 class="font-display font-black text-xl text-white text-center">
        Bem-vindo de volta!
      </h2>

      <p class="text-white text-xs text-center opacity-90">
        Acesse sua conta agora mesmo
      </p>

      <!-- Botão ENTRAR -->
      <button class="mt-2 bg-rosa-botao text-white font-display font-black text-sm tracking-widest uppercase px-10 py-3 rounded-full shadow-md hover:brightness-110 transition-all">
        ENTRAR
      </button>

      <!-- Link "ainda não tem conta" -->
      <p class="text-white text-[11px] opacity-70 cursor-pointer hover:underline mt-1">
        Ainda não possui conta?
      </p>

    </div>
    
    <div class="flex-1 flex flex-col items-center justify-center px-8 py-10 gap-4">

      <div class="text-center mb-1">
        <h3 class="font-display font-black text-xl text-rosa-titulo">
          Crie sua conta
        </h3>
        <p class="text-gray-400 text-xs mt-1">Preencha seus dados</p>
      </div>

    
      <div class="w-full flex items-center bg-white rounded-xl px-4 gap-3 border border-gray-100 shadow-sm focus-within:border-rosa-botao transition-colors">

        <!-- Ícone de pessoa -->
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="#aaa" stroke-width="1.6" viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>

        <input
          type="text"
          placeholder="Nome"
          class="flex-1 py-3.5 text-sm text-gray-700 bg-transparent outline-none font-corpo"
        />
      </div>

      <!-- ── CAMPO: EMAIL ────────────────────────────────────── -->
      <div class="w-full flex items-center bg-white rounded-xl px-4 gap-3 border border-gray-100 shadow-sm focus-within:border-rosa-botao transition-colors">

        <!-- Ícone de envelope -->
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="#aaa" stroke-width="1.6" viewBox="0 0 24 24">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m22 7-10 7L2 7"/>
        </svg>

        <input
          type="email"
          placeholder="Email"
          class="flex-1 py-3.5 text-sm text-gray-700 bg-transparent outline-none font-corpo"
        />
      </div>

      <!-- ── CAMPO: SENHA ────────────────────────────────────── -->
      <div class="w-full flex items-center bg-white rounded-xl px-4 gap-3 border border-gray-100 shadow-sm focus-within:border-rosa-botao transition-colors">

        <!-- Ícone de cadeado -->
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="#aaa" stroke-width="1.6" viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          <line x1="12" y1="15" x2="12" y2="17"/>
        </svg>

        <input
          type="password"
          placeholder="Senha"
          class="flex-1 py-3.5 text-sm text-gray-700 bg-transparent outline-none font-corpo"
        />
      </div>

      <!-- Botão CADASTRAR -->
      <button class="mt-2 bg-rosa-botao text-white font-display font-black text-sm tracking-widest uppercase px-12 py-3 rounded-full shadow-md hover:brightness-110 transition-all">
        CADASTRAR
      </button>

    </div>

  </div>


</body>
</html>
